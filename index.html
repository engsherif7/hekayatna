<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا مع أسماء ❤️</title>
    <style>
        body { background-color: #fff0f5; font-family: 'Arial', sans-serif; text-align: center; overflow-x: hidden; margin: 0; padding: 0; }
        .container { padding: 20px; }
        h1 { color: #ff4d6d; margin-top: 20px; }
        .counter { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; margin: 15px 0; width: 85%; max-width: 400px; }
        
        #timer { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 15px; direction: ltr; }
        
        .unit-row {
            display: flex; justify-content: space-between; width: 100%; max-width: 220px; padding: 10px 15px;
            background: #fffafa; border-bottom: 1px solid #ffe4e1; font-size: 22px; font-weight: bold;
        }

        .unit-row span:first-child { color: #333; }
        .unit-row span:last-child { color: #ff4d6d; font-size: 16px; font-weight: normal; min-width: 70px; text-align: right; }

        .btn { background-color: #ff8fab; color: white; border: none; padding: 15px 25px; margin: 8px; border-radius: 12px; cursor: pointer; font-size: 18px; width: 85%; max-width: 320px; transition: 0.3s; font-weight: bold; }
        .btn:hover { background-color: #ff4d6d; transform: scale(1.03); }
        
        /* قلوب متطايرة في الخلفية */
        .heart { position: fixed; bottom: -10px; color: #ff4d6d; animation: float 4s linear infinite; z-index: -1; }
        @keyframes float { to { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h1>💖 بداية حكايتنا 💖</h1>
    <p style="font-weight: bold; color: #555;">27/8/2023</p>
    
    <div class="counter">
        <p style="color: #ff4d6d; font-weight: bold; font-size: 18px; margin-bottom: 10px;">فات علي اجمل نظرة لأجمل عيون:</p>
        <div id="timer"></div>
    </div>
    
    <br>
    <button class="btn" onclick="showLoveMsg()">❤️ كلمة من قلبي</button>
    <button class="btn" onclick="showSurprise()">✨ مفاجأة البدايات</button>
    <button class="btn" onclick="showPoem()">💌 رسالة خاصة لأسماء</button>
</div>

<script>
    function updateTimer() {
        const start = new Date('2023-08-27T18:30:00');
        const now = new Date();
        
        let years = now.getFullYear() - start.getFullYear();
        let months = now.getMonth() - start.getMonth();
        let days = now.getDate() - start.getDate();
        let hours = now.getHours() - start.getHours();
        let minutes = now.getMinutes() - start.getMinutes();
        let seconds = now.getSeconds() - start.getSeconds();

        if (seconds < 0) { seconds += 60; minutes--; }
        if (minutes < 0) { minutes += 60; hours--; }
        if (hours < 0) { hours += 24; days--; }
        if (days < 0) {
            const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
            days += lastMonth.getDate();
            months--;
        }
        if (months < 0) { months += 12; years--; }

        const weeks = Math.floor(days / 7);
        const remainingDays = days % 7;

        const units = [
            { val: years, label: "سنة" },
            { val: months, label: "شهر" },
            { val: weeks, label: "أسبوع" },
            { val: remainingDays, label: "يوم" },
            { val: hours, label: "ساعة" },
            { val: minutes, label: "دقيقة" },
            { val: seconds, label: "ثانية" }
        ];

        document.getElementById('timer').innerHTML = units
            .map(u => `<div class="unit-row"><span>${u.val}</span><span>${u.label}</span></div>`)
            .join('');
    }

    setInterval(updateTimer, 1000);
    updateTimer();

    const poemVerses = [
        "بربك من حباك السحر شهدا.. وصاغ من عينيك الروح والجسدا",
        "ومن أهداك هذا الحسن آياً.. فغدوت في فؤادي ذكراً ووردا",
        "تغار الشمس إن لاحت لعشق.. فليس لها سوى خديك ندا",
        "سبحان من سوى في عينيك جنته.. وأودع السحر والأجفان والمقلا",
        "فيا نبع الجمال الروح ظمأى.. وقربك كوثر ينساب بردا",
        "يا قبلة الروح إن ضلت مراكبها.. ويا ملاذ المنى لمن رام أو قصدا",
        "وما الشعر الجميل سوى انعكاس.. لنورك حين يكتب أو يؤدى",
        "يغازلك النسيم في تيه وفى دلع.. وزهر الروض من عينيك وجدا",
        "مدت يدها، يا الله من ترف.. أعادت نبضه من بعد ما فقد",
        "كأن أصابعاً عزفت بلحن.. أذاب القيد والأغلال هذا",
        "لا تحكي فعيناك استفاضت.. بشرح الحب والفؤاد أبدى",
        "تركت لأجلك الدنا جميعاً.. وعشت بعالمك المسحور فردا",
        "فلنمضي في الحب لا نخشى نوائبه.. ولا نخشى من الأيام صدا",
        "وخلي العين للأحلام باباً.. فلا خوف وأنت اليوم أدرا",
        "لو كان حبك ناراً لست أطفئها.. بل أشهد الله قلبى عاش واتقدا",
        "خذي عمري فداءً يا حياتي.. فما عاش الذي لم يفى وعدا"
    ];

    const extraMsgs = [
        "إنتي القصيدة اللي عجز شعراء الأرض يوصفوها ❤️",
        "لو كان الحب وطناً لكنتِ أنتِ عاصمته ✨",
        "بحبك يا أجمل دكتورة في الدنيا 🌹"
    ];

    const allContent = [...poemVerses, ...extraMsgs];

    function showLoveMsg() {
        const msg = allContent[Math.floor(Math.random() * allContent.length)];
        alert(msg);
    }

    function showSurprise() {
        const surprises = [
            "نتمشى سوا على النيل ❤️", "نروح السينما سوا 🎬", "قعدة رايقة في كافيه ☕", 
            "خروجة في مركب في النيل ⛵", "اختاري إنتي مكان على ذوقك ✨", "نروح الملاهي سوا 🎡"
        ];
        alert("مفاجأة: " + surprises[Math.floor(Math.random() * surprises.length)]);
    }

    function showPoem() {
        alert("يقولونَ: صبراً.. والصبـرُ في عينيكِ مستحيلُ\nفيا وَيحَ قلبي، كـيفَ ينجو ومنكِ الرحيلُ؟\nشمسٌ أنتِ في وسطِ الوجوهِ، ونوركِ ظليلُ\nفاللهُ يعينُ مَن غـرِقَ في بحرِ عيـنِكِ الجميلُ.");
    }

    // إضافة تأثير القلوب المتطايرة
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 20 + 15 + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    }
    setInterval(createHeart, 600);
</script>

</body>
</html>
